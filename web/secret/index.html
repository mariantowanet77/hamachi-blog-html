<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>？？？｜はまち日和</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/common/favicon.svg">
  <link rel="stylesheet" href="../common/style.css">
</head>
<!-- data-base = web ルートまでの相対パス。1階層深いので ../ -->
<body data-base="../">

  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-title" href="../index.html">はまち日和</a>
      <nav class="site-nav">
        <a class="btn" href="../index.html">ホーム</a>
        <a class="btn" href="../pastarticles/index.html">過去の記事</a>
        <a class="btn" href="../about/index.html">このブログについて</a>
      </nav>
    </div>
  </header>

  <div class="layout layout--secret">
    <main class="content">
      <section class="hero">
        <h1>ようこそ、ひ♡み♡つ の部屋へ</h1>
        <p>……ここはまだ何もない、隠し部屋のひな形です。<br>
           ここに謎解きの仕掛けを少しずつ足していきます。</p>
      </section>

      <!-- =================================================================
           ▼ ここから下に謎解きの仕掛けを足していきます（今はサンプル）
           例）合言葉を入力すると次のヒントが出る、など
           ================================================================= -->
      <section class="puzzle" id="puzzle">
        <p class="puzzle__riddle">第一の問い：合言葉をどうぞ。</p>
        <form id="puzzle-form" class="puzzle__form" autocomplete="off">
          <input type="text" id="puzzle-input" class="puzzle__input" placeholder="ここに入力…">
          <button type="submit" class="btn btn--primary">こたえる</button>
        </form>
        <p id="puzzle-result" class="puzzle__result" role="status"></p>
      </section>

      <p style="margin-top:2em;"><a href="../index.html">← そっと戻る</a></p>
    </main>
  </div>

  <footer class="site-footer">
    <p class="access-count">累計アクセス数：<span id="access-count">—</span></p>
    <p class="copyright">© 2026 はまち日和</p>
  </footer>

  <script src="../common/site.js"></script>

  <!-- =====================================================================
       謎解き用スクリプト（このページ専用のサンプル）
       仕掛けが増えてきたら common 配下のファイルに分けてもOKです。
       ※ HTML/JS は誰でも見られるので、本気の答えはこの方式だと丸見えです。
         「軽い遊び」用と割り切ってください。
       ===================================================================== -->
  <script>
    (function () {
      const form   = document.getElementById('puzzle-form');
      const input  = document.getElementById('puzzle-input');
      const result = document.getElementById('puzzle-result');
      if (!form) return;

      // ▼ 合言葉（とりあえずのサンプル。あとで好きに変えてください）
      const ANSWER = 'はまち';

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        const value = input.value.trim();
        if (value === ANSWER) {
          result.textContent = '🎉 正解！…次の仕掛けはこれから作ります。';
          result.className = 'puzzle__result puzzle__result--ok';
        } else {
          result.textContent = '❌ ちがうみたい。もう一度どうぞ。';
          result.className = 'puzzle__result puzzle__result--ng';
        }
      });
    })();
  </script>
</body>
</html>
