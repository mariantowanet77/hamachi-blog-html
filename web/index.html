<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>はまち日和｜トップ</title>
  <link rel="stylesheet" href="common/style.css">
</head>
<!-- data-base = web ルートまでの相対パス。トップ階層なので空。 -->
<body data-base="">

  <!-- ===== ヘッダー（全ページ共通の見た目） ===== -->
  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-title" href="index.html">はまち日和</a>
      <nav class="site-nav">
        <a class="btn btn--primary" href="index.html">ホーム</a>
        <a class="btn" href="pastarticles/index.html">過去の記事</a>
        <a class="btn" href="about/index.html">このブログについて</a>
      </nav>
    </div>
  </header>

  <!-- ===== 本文 + サイドバー ===== -->
  <div class="layout">

    <main class="content">
      <section class="hero">
        <!-- data-typewriter = 1文字あたりの表示間隔(ミリ秒)。数字を変えると速度が変わります -->
        <h1 class="typewriter" data-typewriter="110">ようこそ、はまち日和 へ 🌿</h1>
        <p>ここはブログのトップ（タイトル）画面です。下のボタンから各ページへ移動できます。</p>
        <div class="hero__actions">
          <a class="btn btn--primary" href="pastarticles/index.html">過去の記事を見る</a>
          <a class="btn" href="about/index.html">このブログについて</a>
        </div>
      </section>

      <h2>最新の記事</h2>
      <!-- ↓ JS（common/site.js）が記事カードを自動で入れます -->
      <div class="card-grid" id="latest-articles"></div>
    </main>

    <!-- ===== サイドバー：過去の記事 ===== -->
    <aside class="sidebar">
      <section class="sidebar__block">
        <h2 class="sidebar__title">過去の記事</h2>
        <ul class="article-list" id="sidebar-articles"></ul>
      </section>
    </aside>

  </div>

  <!-- ===== フッター：累計アクセス数 ===== -->
  <footer class="site-footer">
    <p class="access-count">累計アクセス数：<span id="access-count">—</span></p>
    <p class="copyright">© 2026 はまち日和</p>
    <a class="secret-link" href="secret/index.html">【ひ♡み♡つ】</a>
  </footer>

  <script src="common/site.js"></script>
</body>
</html>
