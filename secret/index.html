<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>？？？｜はまち日和</title>
  <link rel="icon" type="image/svg+xml" href="/assets/common/favicon.svg">
  <link rel="stylesheet" href="/common/style.css">
</head>
<body data-base="/">
  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-title" href="/">はまち日和</a>
      <nav class="site-nav">
        <a class="btn" href="/">ホーム</a>
        <a class="btn" href="/pastarticles/">過去の記事</a>
        <a class="btn" href="/about/">このブログについて</a>
      </nav>
    </div>
  </header>
  <div class="layout layout--secret">
    <main class="content">
      <section class="hero">
        <h1>ようこそ、ひ♡み♡つ の部屋へ</h1>
        <p>なんか色々使った私の遊び場になります。<br>
        ごりごりにAI使ってるのでご了承ください。</p>
      </section>
      <section class="puzzle" id="puzzle">
        <p class="puzzle__riddle"></p>
        <div class="ms" id="ms">
          <div class="ms__bar">
            <span class="ms__stat" title="残りの地雷（推定）">💣 <span id="ms-mines">10</span></span>
            <button type="button" class="ms__face" id="ms-face" aria-label="やり直す">🫠</button>
            <span class="ms__stat" title="経過時間">⏱ <span id="ms-time">0</span></span>
          </div>
          <div class="ms__board" id="ms-board" role="grid" aria-label="マインスイーパー盤面"></div>
        </div>
        <p class="ms__hint">左クリック：開く／右クリック（スマホは長押し）：🚩 旗を立てる</p>
        <p id="puzzle-result" class="puzzle__result" role="status"></p>
      </section>

      <!-- クリアすると現れる「次の画面」 -->
      <section class="secret-next" id="secret-next" hidden>
        <h2>🎉 突破！</h2>
        <p>やるね、君。次に進みたまえ。ﾝﾁｭ</p>
        <p style="margin-top:14px;">
          <a class="btn btn--primary" href="/secret/moguratataki/">伝説のゲームに進む</a>
        </p>
      </section>

      <p style="margin-top:2em;"><a href="/">← なにも見なかったことにする</a></p>
    </main>
  </div>
  <footer class="site-footer">
    <p class="access-count">あなたは <span id="access-count">—</span> 番目の来訪者です！</p>
    <p class="copyright">© 2026 はまち日和</p>
  </footer>
  <script src="/common/site.js"></script>
  <script>
    /* ===== 標準的なマインスイーパー（9×9・地雷10個） ===== */
    (function () {
      const ROWS = 9, COLS = 9, MINES = 10;

      const boardEl = document.getElementById('ms-board');
      const faceEl  = document.getElementById('ms-face');
      const mineEl  = document.getElementById('ms-mines');
      const timeEl  = document.getElementById('ms-time');
      const result  = document.getElementById('puzzle-result');
      const nextEl  = document.getElementById('secret-next');
      if (!boardEl) return;

      let cells   = [];     // 各マスの状態
      let started = false;  // 初手を打ったか（初手は必ず安全にするため）
      let over    = false;  // ゲーム終了フラグ
      let flags   = 0;      // 立てた旗の数
      let opened  = 0;      // 開いたマスの数
      let timer   = null, seconds = 0;

      const idx      = (r, c) => r * COLS + c;
      const inBounds = (r, c) => r >= 0 && r < ROWS && c >= 0 && c < COLS;

      // 周囲8マスの座標
      function neighbors(r, c) {
        const list = [];
        for (let dr = -1; dr <= 1; dr++)
          for (let dc = -1; dc <= 1; dc++)
            if ((dr || dc) && inBounds(r + dr, c + dc)) list.push([r + dr, c + dc]);
        return list;
      }

      // 盤面を初期化して新しいゲームを始める
      function build() {
        cells = [];
        for (let r = 0; r < ROWS; r++)
          for (let c = 0; c < COLS; c++)
            cells.push({ r, c, mine: false, near: 0, open: false, flag: false, boom: false });
        started = over = false;
        flags = opened = seconds = 0;
        stopTimer();
        timeEl.textContent = '0';
        mineEl.textContent = MINES;
        faceEl.textContent = '🫠';
        result.textContent = '';
        result.className = 'puzzle__result';
        nextEl.hidden = true;
        render();
      }

      // 初手とその周囲を避けて地雷を配置し、周囲の地雷数を数える
      function placeMines(safeR, safeC) {
        const forbidden = new Set([idx(safeR, safeC)]);
        neighbors(safeR, safeC).forEach(([r, c]) => forbidden.add(idx(r, c)));
        let placed = 0;
        while (placed < MINES) {
          const i = Math.floor(Math.random() * cells.length);
          if (cells[i].mine || forbidden.has(i)) continue;
          cells[i].mine = true;
          placed++;
        }
        for (const cell of cells) {
          if (cell.mine) continue;
          cell.near = neighbors(cell.r, cell.c)
            .filter(([r, c]) => cells[idx(r, c)].mine).length;
        }
      }

      // 空きマスを再帰的に開く（0なら周囲も連鎖して開く）
      function reveal(r, c) {
        const cell = cells[idx(r, c)];
        if (cell.open || cell.flag) return;
        cell.open = true;
        opened++;
        if (cell.near === 0) neighbors(r, c).forEach(([nr, nc]) => reveal(nr, nc));
      }

      function onLeft(r, c) {
        if (over) return;
        const cell = cells[idx(r, c)];
        if (cell.open || cell.flag) return;
        if (!started) { placeMines(r, c); started = true; startTimer(); }
        if (cell.mine) { lose(cell); return; }
        reveal(r, c);
        render();
        if (opened === cells.length - MINES) win();
      }

      function onRight(r, c) {
        if (over) return;
        const cell = cells[idx(r, c)];
        if (cell.open) return;
        cell.flag = !cell.flag;
        flags += cell.flag ? 1 : -1;
        mineEl.textContent = MINES - flags;
        render();
      }

      function lose(hit) {
        over = true;
        stopTimer();
        hit.boom = true;
        for (const cell of cells) if (cell.mine) cell.open = true; // 地雷を全公開
        render();
        faceEl.textContent = '🥴';
        result.textContent = '💥 地雷を踏んでしまった…！🙂 を押してもう一度。';
        result.className = 'puzzle__result puzzle__result--ng';
      }

      function win() {
        over = true;
        stopTimer();
        sessionStorage.setItem('hamachi_ms_clear', '1'); // もぐらたたきへの通行証
        for (const cell of cells) if (cell.mine) cell.flag = true; // 残りは自動で旗
        mineEl.textContent = '0';
        render();
        faceEl.textContent = '😎';
        result.textContent = '🎉 クリア！すべての地雷を回避しました。';
        result.className = 'puzzle__result puzzle__result--ok';
        nextEl.hidden = false;                       // ← 次の画面を表示
        nextEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      // 盤面を描画（81マスなので毎回作り直しでも十分軽い）
      function render() {
        boardEl.style.setProperty('--ms-cols', COLS);
        boardEl.innerHTML = '';
        for (const cell of cells) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'ms__cell';
          btn.dataset.r = cell.r;
          btn.dataset.c = cell.c;
          if (cell.open) {
            btn.classList.add('is-open');
            if (cell.mine) {
              btn.classList.add('is-mine');
              btn.textContent = cell.boom ? '💥' : '💣';
            } else if (cell.near > 0) {
              btn.textContent = cell.near;
              btn.dataset.n = cell.near;
            }
          } else if (cell.flag) {
            btn.textContent = '🚩';
          }
          boardEl.appendChild(btn);
        }
      }

      function startTimer() {
        stopTimer();
        timer = setInterval(() => {
          seconds = Math.min(seconds + 1, 999);
          timeEl.textContent = seconds;
        }, 1000);
      }
      function stopTimer() { if (timer) { clearInterval(timer); timer = null; } }

      // --- 操作（イベント委譲。盤面自体は使い回すのでハンドラは一度だけ登録） ---
      let suppressClick = false;   // 長押しで旗を立てた直後のクリックを無視する
      let pressTimer = null;

      boardEl.addEventListener('click', (e) => {
        const el = e.target.closest('.ms__cell');
        if (!el) return;
        if (suppressClick) { suppressClick = false; return; }
        onLeft(+el.dataset.r, +el.dataset.c);
      });
      boardEl.addEventListener('contextmenu', (e) => {
        const el = e.target.closest('.ms__cell');
        if (!el) return;
        e.preventDefault();
        onRight(+el.dataset.r, +el.dataset.c);
      });
      // スマホ：長押しで旗
      boardEl.addEventListener('touchstart', (e) => {
        const el = e.target.closest('.ms__cell');
        if (!el) return;
        pressTimer = setTimeout(() => {
          suppressClick = true;
          onRight(+el.dataset.r, +el.dataset.c);
        }, 450);
      }, { passive: true });
      const cancelPress = () => clearTimeout(pressTimer);
      boardEl.addEventListener('touchend', cancelPress);
      boardEl.addEventListener('touchmove', cancelPress);
      boardEl.addEventListener('touchcancel', cancelPress);

      faceEl.addEventListener('click', build);

      build();
    })();
  </script>
</body>
</html>
