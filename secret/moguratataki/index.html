<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <script>
    /* 直リンク対策：マインスイーパー未クリアなら強制送還 */
    if (sessionStorage.getItem('hamachi_ms_clear') !== '1') location.replace('/secret/');
  </script>
  <title>もぐらたたき｜はまち日和</title>
  <link rel="icon" type="image/svg+xml" href="/assets/common/favicon.svg">
  <link rel="stylesheet" href="/common/style.css">
  <style>
    /* ===== もぐらたたき 専用スタイル ===== */
    .mg { text-align: center; }

    /* 中央のでっかいスタートボタン（約80px） */
    .mg__start {
      display: inline-block;
      margin: 32px auto;
      padding: 0 48px;
      height: 80px;
      line-height: 80px;
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      box-shadow: 0 6px 0 var(--accent-dk);
      transition: transform .08s ease, box-shadow .08s ease;
    }
    .mg__start:hover { background: var(--accent-dk); }
    .mg__start:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--accent-dk); }

    /* スコア・タイマーのバー */
    .mg__bar {
      display: flex;
      justify-content: center;
      gap: 28px;
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 18px;
    }
    .mg__bar .val { color: var(--accent); font-variant-numeric: tabular-nums; }
    .mg__bar .val--warn { color: #c0392b; }

    /* 3×3 の盤面 */
    .mg__board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 420px;
      margin: 0 auto;
    }
    .mg__hole {
      position: relative;
      aspect-ratio: 1 / 1;
      background: #d9c9a8;
      border: 3px solid #b9a074;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      box-shadow: inset 0 -10px 18px rgba(0,0,0,.12);
    }
    /* 穴の底（土のふくらみ） */
    .mg__hole::after {
      content: "";
      position: absolute;
      left: 8%; right: 8%; bottom: 6%;
      height: 26%;
      background: #c2ad84;
      border-radius: 50%;
      box-shadow: inset 0 4px 6px rgba(0,0,0,.15);
    }
    .mg__mole {
      position: absolute;
      left: 8%; bottom: 4%;
      width: 84%;
      height: 92%;
      object-fit: contain;
      transform: translateY(110%);
      transition: transform .12s ease-out;
      pointer-events: none;
      z-index: 1;
    }
    .mg__mole.is-up { transform: translateY(0); }

    /* 得点ポップアップ */
    .mg__pop {
      position: absolute;
      left: 50%; top: 12%;
      transform: translateX(-50%);
      font-size: 1.5rem;
      font-weight: 900;
      z-index: 2;
      pointer-events: none;
      animation: mg-pop .7s ease-out forwards;
    }
    .mg__pop--plus { color: #2e8b57; text-shadow: 0 1px 2px #fff; }
    .mg__pop--minus { color: #c0392b; text-shadow: 0 1px 2px #fff; }
    @keyframes mg-pop {
      from { opacity: 0; transform: translate(-50%, 6px) scale(.8); }
      30%  { opacity: 1; }
      to   { opacity: 0; transform: translate(-50%, -28px) scale(1.1); }
    }

    .mg__hint { color: var(--muted); font-size: .9rem; margin-top: 16px; }

    /* 次の画面（クリア） */
    .mg-next { display: none; }
    .mg-next.is-shown { display: block; }
    .mg-next .btn--primary { font-size: 1.05rem; padding: 12px 20px; }
  </style>
</head>
<body data-base="/">
  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-title" href="/">はまち日和</a>
      <nav class="site-nav">
        <a class="btn" href="/">ホーム</a>
        <a class="btn" href="/pastarticles/">過去の記事</a>
        <a class="btn" href="/about/">このブログについて</a>
      </nav>
    </div>
  </header>

  <div class="layout layout--secret">
    <main class="content mg">
      <section class="hero">
        <h1>もぐらたたき</h1>
        <p>30秒でモグラを叩け！ 偽物は避けろ！</p>
      </section>

      <!-- スタート前 -->
      <section id="mg-intro">
        <button type="button" class="mg__start" id="mg-start">もぐらたたきやれ！</button>
        <p class="mg__hint">
          モグラを叩くと <b>+1</b>／ボーナスは <b>+5</b>／偽物は <b>-3</b>。<br>
          30秒で <b>30点を超えたら</b> 次の画面へ！
        </p>
      </section>

      <!-- プレイ中 -->
      <section id="mg-game" hidden>
        <div class="mg__bar">
          <span>スコア <span class="val" id="mg-score">0</span></span>
          <span>のこり <span class="val" id="mg-time">30</span> 秒</span>
        </div>
        <div class="mg__board" id="mg-board" aria-label="もぐらたたき盤面"></div>
        <p class="mg__hint">偽物をたたくと減点されるぞ！！</p>
      </section>

      <!-- 結果 -->
      <section id="mg-result" hidden style="text-align:center;">
        <h2 id="mg-result-title" style="border:none;">結果</h2>
        <p id="mg-result-text" style="font-size:1.15rem;"></p>
        <button type="button" class="mg__start" id="mg-retry" style="height:auto;line-height:1.4;padding:14px 32px;font-size:1.15rem;margin:10px;">もう一度</button>

        <!-- 30点超えで出現する次の画面ボタン -->
        <div class="mg-next" id="mg-next">
          <p style="margin-top:24px;">30点突破おめでとう！</p>
          <a class="btn btn--primary" href="./botsu/">真のひみつはこ・ち・ら♡</a>
        </div>
      </section>

      <p style="margin-top:2em;"><a href="/secret/">← そんなにマインスイーパーしたいんか！</a></p>
    </main>
  </div>

  <footer class="site-footer">
    <p class="access-count">あなたは <span id="access-count">—</span> 番目の来訪者です！</p>
    <p class="copyright">© 2026 はまち日和</p>
  </footer>

  <script src="/common/site.js"></script>
  <script>
  /* =====================================================================
     もぐらたたき（3×3・30秒）
       立ち姿 …… 叩くと +1、画像を「やられた」に。叩けず引っ込むと「逃げる」。
       ボーナス … 叩くと +5。
       偽物 … 叩くと -3（叩かなければ無害）。
       30秒終了時、スコアが 30 を超えていれば「次の画面」ボタンを出す。
     ===================================================================== */
  (function () {
    const IMG = '/assets/img/moguratataki/';
    const SRC = {
      stand:  IMG + '立ち姿.png',
      hit:    IMG + 'やられた.png',
      miss:   IMG + '逃げる.png',
      bonus:  IMG + 'ボーナス.png',
      trap:  [IMG + '偽物1.png', IMG + '偽物2.png', IMG + '偽物3.png'],
    };

    const GAME_SEC   = 30;   // 制限時間（秒）
    const CLEAR_OVER = 30;   // これを「超えたら」クリア
    const HOLES      = 9;
    const RUSH_SEC   = 10;   // 残りこの秒数を切ったら2倍速ラッシュ

    // 残り10秒は出現間隔・滞在時間とも半分（=2倍速）
    const speedFactor = () => (timeLeft <= RUSH_SEC ? 0.5 : 1);

    const startBtn = document.getElementById('mg-start');
    const introEl  = document.getElementById('mg-intro');
    const gameEl   = document.getElementById('mg-game');
    const resultEl = document.getElementById('mg-result');
    const boardEl  = document.getElementById('mg-board');
    const scoreEl  = document.getElementById('mg-score');
    const timeEl   = document.getElementById('mg-time');
    const retryBtn = document.getElementById('mg-retry');
    const nextEl   = document.getElementById('mg-next');
    const rTitle   = document.getElementById('mg-result-title');
    const rText    = document.getElementById('mg-result-text');

    let score = 0;
    let timeLeft = GAME_SEC;
    let running = false;
    let clockTimer = null;
    let spawnTimer = null;
    // 各穴の状態： null=空 / { type, alive, popTimer, downTimer }
    const holes = new Array(HOLES).fill(null);
    const holeEls = [];

    // 盤面の 9 マスを生成（1度だけ）
    function buildBoard() {
      boardEl.innerHTML = '';
      holeEls.length = 0;
      for (let i = 0; i < HOLES; i++) {
        const hole = document.createElement('div');
        hole.className = 'mg__hole';
        hole.dataset.i = i;
        const img = document.createElement('img');
        img.className = 'mg__mole';
        img.alt = '';
        hole.appendChild(img);
        boardEl.appendChild(hole);
        holeEls.push(hole);
      }
    }

    const rand = (n) => Math.floor(Math.random() * n);

    function pickType() {
      const r = Math.random();
      if (r < 0.12) return 'bonus';   // 12% ボーナス
      if (r < 0.37) return 'trap';    // 25% 偽物
      return 'stand';                 // 63% 立ち姿
    }

    // 空いている穴にモグラを1体出す
    function spawn() {
      const empties = [];
      for (let i = 0; i < HOLES; i++) if (!holes[i]) empties.push(i);
      if (!empties.length) return;

      const i = empties[rand(empties.length)];
      const type = pickType();
      const img = holeEls[i].querySelector('.mg__mole');

      if (type === 'trap') img.src = SRC.trap[rand(SRC.trap.length)];
      else if (type === 'bonus') img.src = SRC.bonus;
      else img.src = SRC.stand;

      // 立ち上げ
      requestAnimationFrame(() => img.classList.add('is-up'));

      const upTime = (750 + rand(700)) * speedFactor(); // 通常750〜1450ms／ラッシュ時は半分
      const state = { type, alive: true, img, downTimer: null };
      holes[i] = state;

      state.downTimer = setTimeout(() => {
        if (!state.alive) return;
        // 立ち姿を叩けなかった → 逃げる
        if (state.type === 'stand') {
          img.src = SRC.miss;
          setTimeout(() => retract(i, state), 260);
        } else {
          retract(i, state);
        }
      }, upTime);
    }

    // 穴を空に戻す
    function retract(i, state) {
      state.alive = false;
      state.img.classList.remove('is-up');
      setTimeout(() => {
        if (holes[i] === state) {
          holes[i] = null;
          state.img.removeAttribute('src');
        }
      }, 140);
    }

    // 叩かれた
    function whack(i) {
      if (!running) return;
      const state = holes[i];
      if (!state || !state.alive) return;
      state.alive = false;
      clearTimeout(state.downTimer);

      let delta = 0;
      if (state.type === 'stand') { delta = 1;  state.img.src = SRC.hit; }
      else if (state.type === 'bonus') { delta = 5; }
      else if (state.type === 'trap')  { delta = -3; }

      addScore(delta, i);
      // 少し見せてから引っ込める
      setTimeout(() => retract(i, state), 300);
    }

    function addScore(delta, i) {
      score += delta;
      scoreEl.textContent = score;
      // ポップアップ
      const pop = document.createElement('span');
      pop.className = 'mg__pop ' + (delta >= 0 ? 'mg__pop--plus' : 'mg__pop--minus');
      pop.textContent = (delta >= 0 ? '+' : '') + delta;
      holeEls[i].appendChild(pop);
      setTimeout(() => pop.remove(), 700);
    }

    function startGame() {
      score = 0;
      timeLeft = GAME_SEC;
      running = true;
      scoreEl.textContent = '0';
      timeEl.textContent = GAME_SEC;
      timeEl.classList.remove('val--warn');

      introEl.hidden = true;
      resultEl.hidden = true;
      gameEl.hidden = false;
      nextEl.classList.remove('is-shown');

      // 全穴クリア
      for (let i = 0; i < HOLES; i++) holes[i] = null;
      holeEls.forEach((h) => {
        const img = h.querySelector('.mg__mole');
        img.classList.remove('is-up');
        img.removeAttribute('src');
      });

      // タイマー
      clockTimer = setInterval(() => {
        timeLeft--;
        timeEl.textContent = timeLeft;
        if (timeLeft <= RUSH_SEC) timeEl.classList.add('val--warn'); // ラッシュ開始の合図
        if (timeLeft <= 0) endGame();
      }, 1000);

      // スポーン（残り10秒からは間隔半分の2倍速）
      function loop() {
        spawn();
        spawnTimer = setTimeout(loop, (550 + rand(450)) * speedFactor()); // 通常550〜1000ms
      }
      loop();
    }

    function endGame() {
      running = false;
      clearInterval(clockTimer);
      clearTimeout(spawnTimer);
      // 残ったモグラを片付ける
      for (let i = 0; i < HOLES; i++) {
        if (holes[i]) { clearTimeout(holes[i].downTimer); retract(i, holes[i]); }
      }

      gameEl.hidden = true;
      resultEl.hidden = false;

      const cleared = score > CLEAR_OVER;
      if (cleared) {
        sessionStorage.setItem('hamachi_mogura_clear', '1'); // ボツゲームへの通行証
        rTitle.textContent = '🎉 クリア！';
        rText.innerHTML = 'スコア <b>' + score + '</b> 点！ 30点を超えました！';
        nextEl.classList.add('is-shown');
      } else {
        rTitle.textContent = '結果';
        rText.innerHTML = 'スコア <b>' + score + '</b> 点。あと <b>' +
          (CLEAR_OVER + 1 - score) + '</b> 点で次の画面が開きます。もう一度どうぞ！';
        nextEl.classList.remove('is-shown');
      }
    }

    // クリック／タップで叩く（イベント委譲）
    function onHit(e) {
      const hole = e.target.closest('.mg__hole');
      if (!hole) return;
      whack(+hole.dataset.i);
    }
    boardEl.addEventListener('click', onHit);

    startBtn.addEventListener('click', startGame);
    retryBtn.addEventListener('click', startGame);

    buildBoard();
  })();
  </script>
</body>
</html>
