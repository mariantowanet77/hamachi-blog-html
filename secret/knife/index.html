<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>ナイフ発射アニメ — 1bitシルエット</title>
<style>
  /* 白黒のみ：背景=黒 / ナイフ=白。グラデ・影・輪郭線・ぼかしは一切なし */
  html, body { margin: 0; height: 100%; background: #000000; overflow: hidden; }
  #stage { position: fixed; inset: 0; }
  .knife { position: absolute; left: 0; top: 0; will-change: transform, opacity; }
  .knife .kn-w { fill: #FFFFFF; }   /* 白：刃・首・柄・リング */
  .knife .kn-b { fill: #000000; }   /* 黒：柄の巻き溝（背景と同色にして溝＝握りの質感に見せる） */

  /* 操作ヒント（白文字＝テーマ内） */
  .hint {
    position: fixed; left: 12px; top: 10px; z-index: 10;
    font: 12px/1.5 "Segoe UI", system-ui, sans-serif; color: #FFFFFF;
    user-select: none; opacity: .6;
  }
</style>
</head>
<body>
  <p class="hint">クリックで発射 ／ コンソールで <code>knife.spawn()</code></p>
  <div id="stage"></div>

  <!-- クナイのシルエット（複製元）。刃・柄をパーツで分けてメリハリを付ける -->
  <template id="knife-tpl">
    <svg class="knife" width="150" height="33" viewBox="0 0 180 40" aria-hidden="true">
      <!-- ① 刃（菱形）：クナイの刃。回転0 = ← 水平で刃先が左 -->
      <path class="kn-w" d="M8 20 L58 7 L104 15 L104 25 L58 33 Z"/>
      <!-- ② 首（なかご）：刃と柄をつなぐ細い部分。ここで刃と柄を分ける -->
      <path class="kn-w" d="M104 18 L120 18 L120 22 L104 22 Z"/>
      <!-- ③ 柄（グリップ）：刃とは別パーツの角丸バー -->
      <path class="kn-w" d="M121 15 L147 15 Q152 15 152 20 Q152 25 147 25 L121 25 Q116 25 116 20 Q116 15 121 15 Z"/>
      <!-- ④ 柄尻のリング：外円＋内円を evenodd で穴あきに -->
      <path class="kn-w" fill-rule="evenodd" d="M151 20 a11 11 0 1 0 22 0 a11 11 0 1 0 -22 0 M156 20 a6 6 0 1 0 12 0 a6 6 0 1 0 -12 0"/>
      <!-- ⑤ 柄の巻き溝（斜めスリット＝握り部分の質感） -->
      <path class="kn-b" d="M127 16 L129.5 16 L124 24 L121.5 24 Z"/>
      <path class="kn-b" d="M134 16 L136.5 16 L131 24 L128.5 24 Z"/>
      <path class="kn-b" d="M141 16 L143.5 16 L138 24 L135.5 24 Z"/>
    </svg>
  </template>

  <script src="../../common/vendor/gsap.min.js"></script>
  <script>
  /* =====================================================================
     ナイフ発射アニメ（1bitシルエット）
       Step1 出現 : opacity 0→1（フェードイン）
       Step2 回転 : ↖(-45°) → ←(0°) へ回転。位置はほぼ動かさない。
       Step3 発射 : 回転終了後すぐ、水平一直線に「刺す」高速移動。
       Step4 終了 : 画面外に出たら要素を削除

     ★フェーズ別の調整（加速度 = ease / 再生 = 時間）
       「回転フェーズ」「刺すフェーズ」それぞれに MODE を用意:
         MODE = 1 … デフォルト通り
         MODE = 0 … マニュアル（下の *_MANUAL を使う）
       両方 1 なら今まで通り。0 にしたフェーズだけ、手動の加速度・時間で再生する。
       （両方 0 なら、マニュアルで変えた値どうしで再生）
     設計 : knife.spawn(opts) で何本でも生成できる。
     ===================================================================== */
  window.knife = (function () {
    var gsap  = window.gsap;
    var stage = document.getElementById('stage');
    var tpl   = document.getElementById('knife-tpl');

    /* ==== 基本設定 ==== */
    var DUR_FADE    = 0.20;   // Step1 出現：フェード時間（秒）
    var ANGLE_START = -45;    // Step2 開始角：↖（刃先が左上）※回転を逆向きに変更
    var ANGLE_END   = 0;      // Step2 終了角：←（水平・刃先が進行方向へ）
    var DIR         = -1;     // 発射方向：-1=左, +1=右
    var KNIFE_W = 150, KNIFE_H = 33;   // 表示サイズ（px）

    /* ==== フェーズ別の調整 ====
       加速度(ease)の例:
         'none'         等速（加速なし）
         'power2.in'    だんだん加速
         'power2.out'   だんだん減速
         'power2.inOut' 加速して減速
         'back.out(1.7)'行き過ぎて戻る
         'elastic.out(1,0.4)' ぷるっと揺れて止まる
       数字を大きくするほど効きが強くなります（power2→power4 など）。 */

    // ▼ 回転フェーズ（Step2）
    var ROT_MODE         = 1;             // 1=デフォルト / 0=マニュアル
    var ROT_DUR_DEFAULT  = 0.15;          // デフォルトの回転時間（秒）
    var ROT_EASE_DEFAULT = 'power2.out';  // デフォルトの加速度カーブ
    var ROT_DUR_MANUAL   = 0.35;          // ★マニュアル時の回転時間（秒）
    var ROT_EASE_MANUAL  = 'back.out(2)'; // ★マニュアル時の加速度カーブ

    // ▼ 刺すフェーズ（Step3 発射）
    var FIRE_MODE          = 1;           // 1=デフォルト / 0=マニュアル
    var FIRE_SPEED_DEFAULT = 3000;        // デフォルト：速度px/秒（等速・距離から時間を自動計算）
    var FIRE_EASE_DEFAULT  = 'none';      // デフォルトの加速度カーブ（等速）
    var FIRE_DUR_MANUAL    = 0.18;        // ★マニュアル時の発射時間（秒・固定）
    var FIRE_EASE_MANUAL   = 'power3.in'; // ★マニュアル時の加速度カーブ（in=だんだん加速）

    // ナイフを1本生成して発射する
    //   opts.x     発射開始の中心X（省略時：画面幅の80%あたり）
    //   opts.y     中心Y（省略時：画面中央付近でランダム）
    //   opts.speed デフォルト発射の速度px/秒（省略時 FIRE_SPEED_DEFAULT）
    function spawn(opts) {
      opts = opts || {};
      var vw = window.innerWidth, vh = window.innerHeight;
      var x = (opts.x != null) ? opts.x : vw * 0.80;
      var y = (opts.y != null) ? opts.y : vh * (0.30 + Math.random() * 0.40);
      var speed = opts.speed || FIRE_SPEED_DEFAULT;

      var k = tpl.content.firstElementChild.cloneNode(true);
      k.style.left = (x - KNIFE_W / 2) + 'px';
      k.style.top  = (y - KNIFE_H / 2) + 'px';
      stage.appendChild(k);

      // Step3で画面外まで抜ける移動量（進行方向側の端＋ナイフ全長ぶん）
      var travel = (DIR < 0) ? (x + KNIFE_W) : (vw - x + KNIFE_W);

      // フェーズごとに「デフォルト or マニュアル」を解決（加速度＝ease / 再生＝時間）
      var rotDur   = ROT_MODE  ? ROT_DUR_DEFAULT  : ROT_DUR_MANUAL;
      var rotEase  = ROT_MODE  ? ROT_EASE_DEFAULT : ROT_EASE_MANUAL;
      var fireEase = FIRE_MODE ? FIRE_EASE_DEFAULT : FIRE_EASE_MANUAL;
      var fireDur  = FIRE_MODE ? (travel / speed)  : FIRE_DUR_MANUAL;

      gsap.set(k, { opacity: 0, rotation: ANGLE_START, x: 0, transformOrigin: '50% 50%' });

      var tl = gsap.timeline({ onComplete: function () { k.remove(); } });
      tl.to(k, { opacity: 1, duration: DUR_FADE, ease: 'none' })                    // Step1 出現
        .to(k, { rotation: ANGLE_END, duration: rotDur, ease: rotEase })            // Step2 回転
        .to(k, { x: DIR * travel, duration: fireDur, ease: fireEase });             // Step3 刺す（発射）
      return tl;
    }

    // クリックした位置から発射（動作確認用）
    stage.addEventListener('pointerdown', function (e) {
      spawn({ x: e.clientX, y: e.clientY });
    });
    // 読み込み後に1本お披露目
    window.addEventListener('load', function () { setTimeout(spawn, 400); });

    return { spawn: spawn };
  })();
  </script>
</body>
</html>
